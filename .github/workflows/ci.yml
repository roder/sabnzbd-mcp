name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install .
      - run: python -c "import sabnzbd_mcp; print(f'sabnzbd-mcp {sabnzbd_mcp.__version__}')"
      - run: pip install ruff pytest
      - run: ruff check src/
      - run: python -m pytest tests/
      - name: Validate MCP protocol
        run: |
          printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{}}\n{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}\n' | sabnzbd-mcp | python3 -c "
import sys, json
lines = [json.loads(l) for l in sys.stdin if l.strip()]
assert lines[0]['id'] == 1 and 'protocolVersion' in lines[0]['result']
tools = lines[1]['result']['tools']
print(f'{len(tools)} tools registered')
for t in tools:
    assert t['name'].startswith('sab_'), f'Bad tool name: {t[\"name\"]}'
"